<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Super League FF</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 60px auto;
      padding: 40px;
      border: 1px solid #e26f0f;
      border-radius: 8px;
      background: #f9f7f4;
    }
    .login-container h1 {
      color: #06192b;
      margin-bottom: 10px;
      text-align: center;
    }
    .reset-badge {
      text-align: center;
      background: #e26f0f;
      color: white;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #06192b;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #e26f0f;
      box-shadow: 0 0 0 2px rgba(226, 111, 15, 0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #e26f0f;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    button:hover {
      background: #c95d0a;
    }
    button:active {
      background: #a84708;
    }
    .message {
      margin-top: 10px;
      font-size: 14px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .message.show {
      display: block;
    }
    .success {
      background: #dcfce7;
      color: #16a34a;
    }
    .error {
      background: #fee2e2;
      color: #dc2626;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
    .back-link a {
      color: #e26f0f;
      text-decoration: none;
      font-weight: 600;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
    .info-text {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Reset Password</h1>
    <div class="reset-badge">PASSWORD RECOVERY</div>
    
    <p class="info-text">Enter your email address and we'll send you a link to reset your password.</p>
    
    <form id="forgot-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required>
      </div>
      <button type="submit">Send Recovery Email</button>
      <div id="message" class="message"></div>
    </form>

    <div class="back-link">
      <a href="./login.html">← Back to Login</a>
    </div>
  </div>

  <script src="./js/auth.js"></script>
  <script>
    const form = document.getElementById('forgot-form');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const button = form.querySelector('button');

      message.classList.remove('show', 'success', 'error');
      button.style.opacity = '0.6';
      button.style.pointerEvents = 'none';

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ email })
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error_description || 'Failed to send recovery email');
        }

        message.textContent = 'Recovery email sent! Check your inbox for the reset link.';
        message.classList.add('show', 'success');
        form.reset();
        button.style.opacity = '1';
        button.style.pointerEvents = 'auto';
      } catch (err) {
        message.textContent = err.message || 'Error sending recovery email. Please try again.';
        message.classList.add('show', 'error');
        button.style.opacity = '1';
        button.style.pointerEvents = 'auto';
      }
    });
  </script>
</body>
</html>
