<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Super League FF</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 40px;
      border: 1px solid #e26f0f;
      border-radius: 8px;
      background: #f9f7f4;
    }
    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .profile-container h1 {
      color: #06192b;
      margin: 0;
    }
    .user-email {
      color: #666;
      font-size: 14px;
      margin-top: 5px;
    }
    .edit-btn {
      background: #e26f0f;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    .edit-btn:hover {
      background: #c95d0a;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #06192b;
      font-size: 14px;
    }
    .view-mode {
      padding: 10px 12px;
      background: #f0f0f0;
      border-radius: 4px;
      color: #333;
      font-size: 16px;
      min-height: 20px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
      font-family: inherit;
      display: none;
    }
    input:focus {
      outline: none;
      border-color: #e26f0f;
      box-shadow: 0 0 0 2px rgba(226, 111, 15, 0.1);
    }
    input.edit-mode {
      display: block;
    }
    .form-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }
    .form-section h3 {
      color: #06192b;
      font-size: 16px;
      margin-bottom: 15px;
      margin-top: 0;
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }
    button {
      flex: 1;
      padding: 12px;
      background: #e26f0f;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    button:hover {
      background: #c95d0a;
    }
    button:active {
      background: #a84708;
    }
    .logout-btn {
      background: #06192b;
    }
    .logout-btn:hover {
      background: #000;
    }
    .cancel-btn {
      background: #999;
    }
    .cancel-btn:hover {
      background: #777;
    }
    .success {
      color: #16a34a;
      margin-top: 10px;
      padding: 8px;
      background: #dcfce7;
      border-radius: 4px;
      display: none;
    }
    .success.show {
      display: block;
    }
    .error {
      color: #dc2626;
      margin-top: 10px;
      padding: 8px;
      background: #fee2e2;
      border-radius: 4px;
      display: none;
    }
    .error.show {
      display: block;
    }
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <div>
        <h1>My Profile</h1>
        <p class="user-email" id="user-email"></p>
      </div>
      <button class="edit-btn" id="edit-btn">Edit</button>
    </div>

    <form id="profile-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <div class="view-mode" id="name-view"></div>
        <input type="text" id="name">
      </div>

      <div class="form-group">
        <label for="cell_phone">Cell Phone</label>
        <div class="view-mode" id="cell_phone-view"></div>
        <input type="tel" id="cell_phone">
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <div class="view-mode" id="location-view"></div>
        <input type="text" id="location">
      </div>

      <div class="form-section">
        <h3>Social Media</h3>
        <div class="form-group">
          <label for="x_handle">X (Twitter)</label>
          <div class="view-mode" id="x_handle-view"></div>
          <input type="text" id="x_handle" placeholder="@username">
        </div>
        <div class="form-group">
          <label for="bluesky_handle">Bluesky</label>
          <div class="view-mode" id="bluesky_handle-view"></div>
          <input type="text" id="bluesky_handle" placeholder="username.bsky.social">
        </div>
        <div class="form-group">
          <label for="discord_handle">Discord</label>
          <div class="view-mode" id="discord_handle-view"></div>
          <input type="text" id="discord_handle" placeholder="username#0000">
        </div>
      </div>

      <div class="form-section">
        <h3>Fantasy Football</h3>
        <div class="form-group">
          <label for="sleeper_handle">Sleeper Handle</label>
          <div class="view-mode" id="sleeper_handle-view"></div>
          <input type="text" id="sleeper_handle">
        </div>
        <div class="form-group">
          <label for="mfl_handle">MFL Handle</label>
          <div class="view-mode" id="mfl_handle-view"></div>
          <input type="text" id="mfl_handle">
        </div>
      </div>

      <div id="message" class="success"></div>
      <div id="error" class="error"></div>

      <div class="button-group" id="button-group" style="display: none;">
        <button type="submit" id="save-btn">Save Changes</button>
        <button type="button" id="cancel-btn" class="cancel-btn">Cancel</button>
      </div>
    </form>

    <button type="button" id="logout-btn" class="logout-btn">Logout</button>
  </div>

  <script src="javascript/auth.js"></script>
  <script>
    const profileForm = document.getElementById('profile-form');
    const messageEl = document.getElementById('message');
    const errorEl = document.getElementById('error');
    const editBtn = document.getElementById('edit-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const buttonGroup = document.getElementById('button-group');
    const saveBtn = document.getElementById('save-btn');

    const fields = ['name', 'cell_phone', 'location', 'x_handle', 'bluesky_handle', 'discord_handle', 'sleeper_handle', 'mfl_handle'];

    function toggleEditMode(isEditing) {
      fields.forEach(field => {
        const input = document.getElementById(field);
        const view = document.getElementById(`${field}-view`);
        if (isEditing) {
          view.style.display = 'none';
          input.classList.add('edit-mode');
        } else {
          view.style.display = 'block';
          input.classList.remove('edit-mode');
        }
      });
      editBtn.style.display = isEditing ? 'none' : 'block';
      buttonGroup.style.display = isEditing ? 'flex' : 'none';
    }

    async function loadProfile() {
      if (!auth.isAuthenticated()) {
        window.location.href = './login.html';
        return;
      }

      document.getElementById('user-email').textContent = `Email: ${auth.user.email}`;

      const profile = auth.profile;
      
      fields.forEach(field => {
        const input = document.getElementById(field);
        const view = document.getElementById(`${field}-view`);
        const value = profile[field] || '';
        input.value = value;
        view.textContent = value || '(not set)';
      });
    }

    editBtn.addEventListener('click', () => {
      toggleEditMode(true);
    });

    cancelBtn.addEventListener('click', () => {
      loadProfile();
      toggleEditMode(false);
    });

    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');
      messageEl.classList.remove('show');
      saveBtn.classList.add('loading');

      try {
        await auth.updateProfile({
          name: document.getElementById('name').value,
          cell_phone: document.getElementById('cell_phone').value,
          location: document.getElementById('location').value,
          x_handle: document.getElementById('x_handle').value,
          bluesky_handle: document.getElementById('bluesky_handle').value,
          discord_handle: document.getElementById('discord_handle').value,
          sleeper_handle: document.getElementById('sleeper_handle').value,
          mfl_handle: document.getElementById('mfl_handle').value,
        });
        messageEl.textContent = 'Profile saved!';
        messageEl.classList.add('show');
        saveBtn.classList.remove('loading');
        setTimeout(() => {
          toggleEditMode(false);
          loadProfile();
        }, 1500);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
        saveBtn.classList.remove('loading');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await auth.logout();
      window.location.href = './login.html';
    });

    loadProfile();
  </script>
</body>
</html>
