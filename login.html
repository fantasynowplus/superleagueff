<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Super League FF</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 60px auto;
      padding: 40px;
      border: 1px solid #e26f0f;
      border-radius: 8px;
      background: #f9f7f4;
    }
    .login-container h1 {
      color: #06192b;
      margin-bottom: 30px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #06192b;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #e26f0f;
      box-shadow: 0 0 0 2px rgba(226, 111, 15, 0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #e26f0f;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    button:hover {
      background: #c95d0a;
    }
    button:active {
      background: #a84708;
    }
    .error {
      color: #dc2626;
      margin-top: 10px;
      font-size: 14px;
      padding: 8px;
      background: #fee2e2;
      border-radius: 4px;
      display: none;
    }
    .error.show {
      display: block;
    }
    .toggle-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #06192b;
    }
    .toggle-link a {
      color: #e26f0f;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .toggle-link a:hover {
      text-decoration: underline;
    }
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login</h1>
    
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit">Login</button>
      <div id="error" class="error"></div>
    </form>

    <form id="signup-form" style="display: none;">
      <div class="form-group">
        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" required>
      </div>
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" required>
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" required>
      </div>
      <button type="submit">Create Account</button>
      <div id="error-signup" class="error"></div>
    </form>

    <div class="toggle-link">
      <span id="toggle-text">Don't have an account? <a id="toggle-btn">Sign up</a></span>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const toggleBtn = document.getElementById('toggle-btn');
    const toggleText = document.getElementById('toggle-text');
    const loginError = document.getElementById('error');
    const signupError = document.getElementById('error-signup');

    function attachToggleListener() {
      document.getElementById('toggle-btn').addEventListener('click', toggleForms);
    }

    function toggleForms(e) {
      e.preventDefault();
      const isLoginVisible = loginForm.style.display !== 'none';
      loginForm.style.display = isLoginVisible ? 'none' : 'block';
      signupForm.style.display = isLoginVisible ? 'block' : 'none';
      
      if (isLoginVisible) {
        toggleText.innerHTML = "Already have an account? <a id='toggle-btn'>Login</a>";
      } else {
        toggleText.innerHTML = "Don't have an account? <a id='toggle-btn'>Sign up</a>";
      }
      attachToggleListener();
    }

    attachToggleListener();

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const button = loginForm.querySelector('button');
      
      loginError.classList.remove('show');
      button.classList.add('loading');

      try {
        await auth.login(email, password);
        window.location.href = '/profile.html';
      } catch (err) {
        loginError.textContent = err.message;
        loginError.classList.add('show');
        button.classList.remove('loading');
      }
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const button = signupForm.querySelector('button');
      
      signupError.classList.remove('show');
      button.classList.add('loading');

      try {
        await auth.signup(email, password, name);
        window.location.href = '/profile.html';
      } catch (err) {
        signupError.textContent = err.message;
        signupError.classList.add('show');
        button.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
