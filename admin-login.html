<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Super League</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 60px auto;
      padding: 40px;
      border: 1px solid #e26f0f;
      border-radius: 8px;
      background: #f9f7f4;
    }
    .login-container h1 {
      color: #06192b;
      margin-bottom: 10px;
      text-align: center;
    }
    .admin-badge {
      text-align: center;
      background: #e26f0f;
      color: white;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #06192b;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #e26f0f;
      box-shadow: 0 0 0 2px rgba(226, 111, 15, 0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #e26f0f;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    button:hover {
      background: #c95d0a;
    }
    button:active {
      background: #a84708;
    }
    .error {
      color: #dc2626;
      margin-top: 10px;
      font-size: 14px;
      padding: 8px;
      background: #fee2e2;
      border-radius: 4px;
      display: none;
    }
    .error.show {
      display: block;
    }
    .toggle-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #06192b;
    }
    .toggle-link a {
      color: #e26f0f;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .toggle-link a:hover {
      text-decoration: underline;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
    .back-link a {
      color: #e26f0f;
      text-decoration: none;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Admin Portal</h1>
    <div class="admin-badge">ADMIN ACCESS ONLY</div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit">Login to Admin</button>
      <div id="error" class="error"></div>
    </form>

    <div class="back-link">
      <a href="./login.html">← Back to User Login</a>
    </div>
  </div>

  <script src="./js/auth.js"></script>
  <script>
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('error');

    async function checkAdminAccess() {
      if (!auth.isAuthenticated()) {
        return false;
      }

      let attempts = 0;
      while (!auth.profile && attempts < 50) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
      }

      const adminLevel = auth.profile?.admin_level || 0;
      return adminLevel >= 1;
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const button = loginForm.querySelector('button');
      
      loginError.classList.remove('show');
      button.style.opacity = '0.6';
      button.style.pointerEvents = 'none';

      try {
        await auth.login(email, password);
        
        const hasAccess = await checkAdminAccess();
        
        if (hasAccess) {
          window.location.href = './admin.html';
        } else {
          loginError.textContent = 'You do not have admin access. Please login with an admin account.';
          loginError.classList.add('show');
          await auth.logout();
          button.style.opacity = '1';
          button.style.pointerEvents = 'auto';
        }
      } catch (err) {
        loginError.textContent = err.message;
        loginError.classList.add('show');
        button.style.opacity = '1';
        button.style.pointerEvents = 'auto';
      }
    });
  </script>
</body>
</html>
