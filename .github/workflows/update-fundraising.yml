name: Update Fundraising Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fundraising:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Fetch and extract fundraising amount
        run: |
          python3 << 'EOF'
          import json
          import urllib.request
          
          try:
              url = 'https://www.extra-life.org/api/1.6/teams/73449'
              with urllib.request.urlopen(url) as response:
                  data = json.loads(response.read())
                  amount = data.get('sumDonations', 0)
                  print(f"Amount raised: ${amount}")
                  
                  # Write just the number to the file
                  with open('data/fundraising.json', 'w') as f:
                      json.dump(amount, f)
                  
                  print(f"Saved to data/fundraising.json")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF
      
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fundraising.json
          git commit -m "chore: update fundraising data" || echo "No changes"
          git push
