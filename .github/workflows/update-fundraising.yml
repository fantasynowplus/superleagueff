name: Update Fundraising Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch Extra Life data
        run: |
          curl -s https://www.extra-life.org/api/1.6/teams/73449 | jq '.sumDonations' > data/fundraising.json
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/fundraising.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update fundraising data" && git push)
