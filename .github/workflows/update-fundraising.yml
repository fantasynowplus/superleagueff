name: Update Fundraising Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fundraising:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: apt-get update && apt-get install -y jq
      
      - name: Fetch fundraising amount
        run: |
          AMOUNT=$(curl -s https://www.extra-life.org/api/1.6/teams/73449 | jq '.sumDonations')
          echo "$AMOUNT" > data/fundraising.json
          echo "Amount raised: $AMOUNT"
      
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fundraising.json
          git commit -m "chore: update fundraising data" || echo "No changes to commit"
          git push
