name: Update Standings Data

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch standings
        run: |
          curl -s "https://script.google.com/macros/d/AKfycbyp8FVp2NqGpUghrxlNdxvCcvrQAVs0iB4FRmvElALHwktDqQuXaoyYbYmo_pTb0FVyMw/usercontent" \
            -o data/standings.json
      
      - name: Commit if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/standings.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update standings data" && git push)
