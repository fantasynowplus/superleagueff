name: Update Standings Data

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:     # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch standings from Apps Script
        run: |
          curl -s "https://script.google.com/macros/s/AKfycbzo6MVGc5T331V63LLJ5g1HtyNTTFOPVrpNUWqKzEjCnAXLI_evNrbVij7ykLdl4k8Cfw/exec" \
            -o data/standings.json
      
      - name: Commit if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/standings.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update standings data" && git push)
